<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}后台管理{% endblock %}</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .admin-header {
      background: #111827;
      color: white;
      padding: 18px 28px;
    }

    .admin-header h1 {
      margin: 0;
      font-size: 22px;
    }

    .admin-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .stat-card h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #666;
    }

    .stat-card strong {
      font-size: 28px;
      color: #111827;
    }

    .toolbar {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .toolbar form {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar input,
    .toolbar select {
      height: 40px;
      padding: 0 12px;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      font-size: 14px;
    }

    .btn {
      height: 40px;
      padding: 0 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-success {
      background: #16a34a;
      color: white;
    }

    .btn-warning {
      background: #f59e0b;
      color: white;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .table-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid #eef2f7;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f8fafc;
      color: #374151;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .status-read {
      background: #dcfce7;
      color: #166534;
    }

    .status-unread {
      background: #fee2e2;
      color: #991b1b;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .actions form {
      margin: 0;
    }

    .content-preview {
      max-width: 320px;
      white-space: normal;
      word-break: break-word;
      color: #4b5563;
      line-height: 1.6;
    }

    .pagination {
      display: flex;
      gap: 8px;
      justify-content: center;
      padding: 20px;
      background: white;
      margin-top: 18px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .pagination a,
    .pagination span {
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
    }

    .pagination a {
      background: #e5e7eb;
      color: #111827;
    }

    .pagination .current {
      background: #2563eb;
      color: white;
      font-weight: 700;
    }

    .empty-box {
      padding: 40px;
      text-align: center;
      color: #6b7280;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <header class="admin-header">
    <h1>留言后台管理</h1>
  </header>

  <main class="admin-wrap">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
